<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline | Gluten Free Save Club</title>
    <style>
      body {
        align-items: center;
        background: #fffaf2;
        color: #25160f;
        display: flex;
        font-family: Georgia, serif;
        justify-content: center;
        margin: 0;
        min-height: 100vh;
        padding: 24px;
      }
      main {
        background: #fff;
        border: 1px solid #ead9c4;
        border-radius: 12px;
        box-shadow: 0 18px 50px rgba(55, 33, 20, 0.12);
        max-width: 380px;
        padding: 36px 28px;
        text-align: center;
      }
      .mark {
        background: #3d1a0a;
        border-radius: 50%;
        color: #f4c460;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        font-weight: 900;
        height: 56px;
        width: 56px;
        margin-bottom: 18px;
      }
      h1 { font-size: 26px; margin: 0 0 10px; }
      p { color: #765f50; font-size: 15px; line-height: 1.6; margin: 0; font-family: Arial, sans-serif; }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">GF</div>
      <h1>You're offline.</h1>
      <p>Connect to the internet to see today's rescue boxes and complete your order.</p>
    </main>
  </body>
</html>
